# ============================================
# KONFIGURASI AI PROVIDER
# ============================================
# Pilih provider: groq, openai, gemini
debug.ai.provider=groq
debug.ai.enabled=true
debug.ai.max-stack-trace-lines=10

# Groq API
groq.api.key=${GROQ_API_KEY:}
groq.model=llama-3.3-70b-versatile

# OpenAI API
openai.api.key=${OPENAI_API_KEY:}
openai.model=gpt-3.5-turbo
openai.temperature=0.1

# Google Gemini API
gemini.api.key=${GEMINI_API_KEY:}
gemini.model=gemini-2.0-flash-lite

# ============================================
# FEATURES
# ============================================
# Error History
debug.history.enabled=true
debug.history.path=./error-logs

# Clipboard
debug.clipboard.enabled=true

# Session Memory
debug.session.enabled=true

# Notifications (Discrod, Slack, Telegram)
debug.auto.notify=false
notification.enabled=false
notification.rate-limit-seconds=60
discord.webhook.url=${DISCORD_WEBHOOK_URL:}
slack.webhook.url=${SLACK_WEBHOOK_URL:}
telegram.bot.token=${TELEGRAM_BOT_TOKEN:}
telegram.chat.id=${TELEGRAM_CHAT_ID:}

# Logging (minimal)
logging.level.com.llm.ai=DEBUG
logging.level.org.springframework.web=INFO

# Security
debug.auth.enabled=false

# Rate Limit (nonaktif di dev)
debug.rate-limit.enabled=false
debug.rate-limit.requests=10
debug.rate-limit.seconds=60

# Production mode
debug.mode=development
server.error.include-stacktrace=always
server.error.include-exception=true